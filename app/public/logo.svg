<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d0a1f"/>
      <stop offset="100%" stop-color="#0f0712"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- Pink border -->
  <rect width="64" height="64" rx="15" stroke="#ec4899" stroke-width="1.5" opacity="0.4" fill="none"/>

  <!-- Letters OF -->
  <text
    filter="url(#glow)"
    x="32"
    y="42"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="30"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#text-grad)"
  >OF</text>

  <!-- Underline accent -->
  <rect x="14" y="47" width="36" height="2.5" rx="1.25" fill="#ec4899" opacity="0.5"/>
</svg>

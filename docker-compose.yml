services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
      - DB_DIR=/app/db
      - PORT=3001
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ./server/db:/app/db

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.app
    restart: unless-stopped
    ports:
      - "6905:80"
    depends_on:
      - server

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    user: "${UID:-999}:${GID:-1000}"
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
      - DB_DIR=/app/db
      - PORT=3001
      - BACKUP_BASE_URL=${BACKUP_BASE_URL:-http://host.docker.internal:6906}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ./server/db:/app/db

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.app
    restart: unless-stopped
    ports:
      - "6905:80"
    depends_on:
      - server
